version: '3.9'

services:
  qdrant: # Vector DB
    image: qdrant/qdrant:v1.9.0
    container_name: nhlrag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes: 
      - './data/qdrant_storage:/qdrant/storage'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  redis: # streams + APScheduler
    image: redis:7.2-alpine
    container_name: nhlrag_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: nhlrag_ingestion
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT:-NHLRAG/0.1}
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared

  fastapi:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: nhlrag_api
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared
    extra_hosts:
      - "host.docker.internal:host-gateway"

  streamlit:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nhlrag_streamlit
    ports:
      - "8501:8501"
    depends_on:
      - fastapi
    environment:
      - FASTAPI_URL=http://fastapi:8000
    profiles:
      - ui
    volumes:
      - ./shared:/app/shared

volumes:
  redis_data:


