services:
  qdrant:  # Vector db
    image: qdrant/qdrant:latest
    container_name: nhlrag_qdrant
    ports: 
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:  # streams + APScheduler
    image: redis:7.2-alpine
    container_name: nhlrag_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    
  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: nhlrag_ingestion
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache/huggingface
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped

  fastapi:
    build:
      context: ./services/fastapi
      dockerfile: Dockerfile
    container_name: nhlrag_api
    ports:
     - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache/huggingface
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
  streamlit:
    build:
      context: ./services/streamlit
      dockerfile: Dockerfile
    container_name: nhlrag_streamlit
    ports:
      - "8501:8501"
    depends_on:
      fastapi:
        condition: service_healthy
    environment:
      - FASTAPI_URL=http://fastapi:8000
    restart: unless-stopped
    profiles:
      - ui 

volumes:
  qdrant_data:
  redis-data:  
  model_cache:

